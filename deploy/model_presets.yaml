strix_halo_64:
  description: AMD Strix Halo, 64GB unified memory
  vram_allocation_gb: 48
  kernel_params:
    amdgpu.gttsize: 49152
    ttm.page_pool_size: 12800000
    ttm.pages_limit: 12800000
  ollama_env:
    HSA_OVERRIDE_GFX_VERSION: 11.5.1
    OLLAMA_KEEP_ALIVE: '-1'
    OLLAMA_FLASH_ATTENTION: '1'
    OLLAMA_NUM_PARALLEL: '2'
  models:
  - name: qwen3.5:35b-a3b
    role: primary
    quant: Q4_K_M
    vram_gb: 20
    description: MoE daily driver — agentic coding, general tasks
  - name: qwen3.5:9b
    role: fast
    quant: Q4_K_M
    vram_gb: 6
    description: Quick responses, classification, extraction
  - name: qwen3.5:4b
    role: embeddings
    quant: Q4_K_M
    vram_gb: 3
    description: Lightest tasks, routing decisions
