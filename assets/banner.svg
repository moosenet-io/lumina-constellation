<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#241a3f"/>
      <stop offset="45%" stop-color="#1a1430"/>
      <stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <radialGradient id="titleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5b3fb0" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#3a2a6e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3a2a6e" stop-opacity="0"/>
    </radialGradient>
    <!-- luminous core: bright center fading to violet -->
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="22%" stop-color="#d9ccff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#9a7cff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="70" cy="180" r="1.1" opacity="0.5"/><circle cx="150" cy="55" r="0.9" opacity="0.35"/>
    <circle cx="240" cy="300" r="1.3" opacity="0.55"/><circle cx="60" cy="430" r="1" opacity="0.4"/>
    <circle cx="320" cy="120" r="0.8" opacity="0.3"/><circle cx="200" cy="500" r="1.1" opacity="0.45"/>
    <circle cx="500" cy="60" r="0.9" opacity="0.4"/><circle cx="820" cy="40" r="1" opacity="0.4"/>
    <circle cx="1040" cy="90" r="1.2" opacity="0.5"/><circle cx="1180" cy="200" r="0.9" opacity="0.4"/>
    <circle cx="1230" cy="120" r="1.1" opacity="0.45"/><circle cx="1120" cy="330" r="1" opacity="0.4"/>
    <circle cx="960" cy="250" r="0.8" opacity="0.3"/><circle cx="1210" cy="470" r="1.1" opacity="0.45"/>
    <circle cx="1080" cy="520" r="0.9" opacity="0.35"/><circle cx="40" cy="300" r="0.9" opacity="0.35"/>
    <circle cx="380" cy="240" r="0.8" opacity="0.3"/><circle cx="900" cy="470" r="0.9" opacity="0.35"/>
    <circle cx="660" cy="520" r="0.8" opacity="0.3"/>
  </g>

  <!-- ===== LUMINA MOTIF: luminous core with concentric orbit rings + orbiting nodes ===== -->
  <!-- the "mind / light" identity: a radiant core (memory+persona) with orbiting capabilities -->
  <g>
    <!-- orbit rings -->
    <ellipse cx="640" cy="138" rx="120" ry="44" fill="none" stroke="#7c5cff" stroke-width="1" opacity="0.3"/>
    <ellipse cx="640" cy="138" rx="78" ry="78" fill="none" stroke="#6b5bbf" stroke-width="1" opacity="0.22"/>
    <ellipse cx="640" cy="138" rx="120" ry="44" fill="none" stroke="#4a6cf6" stroke-width="1" opacity="0.18" transform="rotate(60 640 138)"/>
    <!-- orbiting nodes on the rings -->
    <circle cx="760" cy="138" r="6" fill="#8b5cf6"/>
    <circle cx="520" cy="138" r="6" fill="#8b5cf6"/>
    <circle cx="685" cy="72" r="5.5" fill="#4a6cf6"/>
    <circle cx="595" cy="204" r="5.5" fill="#4a6cf6"/>
    <circle cx="640" cy="60" r="5" fill="#10b981"/>
    <circle cx="640" cy="216" r="4.5" fill="#10b981" opacity="0.85"/>
    <!-- luminous core -->
    <circle cx="640" cy="138" r="40" fill="url(#core)"/>
    <circle cx="640" cy="138" r="11" fill="#ffffff"/>
  </g>

  <!-- ===== TEXT BLOCK ===== -->
  <ellipse cx="640" cy="300" rx="290" ry="62" fill="url(#titleGlow)"/>

  <text x="640" y="228" text-anchor="middle" fill="#b9b0d8" font-size="20" letter-spacing="8" font-weight="500">PERSONAL AI · SOVEREIGN ASSISTANT</text>

  <text x="640" y="322" text-anchor="middle" fill="#ffffff" font-size="92" font-weight="700" letter-spacing="2">LUMINA</text>

  <text x="640" y="372" text-anchor="middle" fill="#7c5cff" font-size="19" letter-spacing="6" font-weight="600" font-family="'Courier New', monospace">LOCAL-FIRST  PERSONAL  AI</text>

  <g>
    <line x1="545" y1="418" x2="600" y2="418" stroke="#6b5bbf" stroke-width="1" opacity="0.6"/>
    <text x="640" y="423" text-anchor="middle" fill="#9b92c0" font-size="13" letter-spacing="3" font-family="'Courier New', monospace">v1.0</text>
    <line x1="680" y1="418" x2="735" y2="418" stroke="#6b5bbf" stroke-width="1" opacity="0.6"/>
  </g>

  <g fill="#8d84ad" font-size="15" letter-spacing="2" font-weight="500">
    <text x="412" y="470" text-anchor="middle">3-TIER MEMORY</text>
    <text x="640" y="470" text-anchor="middle">DYNAMIC PERSONA</text>
    <text x="868" y="470" text-anchor="middle">TOOL ORCHESTRATION</text>
  </g>

  <text x="640" y="567" text-anchor="middle" fill="#564d75" font-size="12" letter-spacing="4">LUMINA</text>
  <text x="640" y="592" text-anchor="middle" fill="#473f63" font-size="11.5" letter-spacing="0.4">A sovereign, local-first personal AI with persistent memory and a stable persona.</text>
</svg>
