<svg width="820" height="40" viewBox="0 0 820 40" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans', Verdana, Helvetica, sans-serif" font-size="11">
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- build -->
  <g>
    <rect x="0" y="8" width="108" height="22" rx="5" fill="#2a2342"/>
    <rect x="52" y="8" width="56" height="22" rx="5" fill="#10b981"/><rect x="52" y="8" width="12" height="22" fill="#10b981"/>
