  </g>
  <!-- version (EDIT) -->
  <g transform="translate(480,0)">
    <rect x="0" y="8" width="96" height="22" rx="5" fill="#2a2342"/>
    <rect x="54" y="8" width="42" height="22" rx="5" fill="#7c5cff"/><rect x="54" y="8" width="12" height="22" fill="#7c5cff"/>
