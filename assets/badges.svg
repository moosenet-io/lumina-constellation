    <text x="26" y="23" text-anchor="middle" fill="#cbc4e6">build</text>
    <text x="80" y="23" text-anchor="middle" fill="#062b1f" font-weight="bold">passing</text>
  </g>
  <!-- tests (EDIT count) -->
  <g transform="translate(118,0)">
