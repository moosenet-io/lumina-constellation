<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
  }

  #header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #58a6ff;
    letter-spacing: 0.5px;
  }

  #status-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3fb950;
    margin-left: auto;
    flex-shrink: 0;
  }

  #status-indicator.pulse {
    animation: pulse 2s infinite;
  }

  #status-indicator.offline {
    background: #f85149;
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(63,185,80,0.4); }
    50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(63,185,80,0); }
  }

  #status-label {
    font-size: 11px;
    color: #8b949e;
  }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
    word-wrap: break-word;
  }

  .msg .ts {
    font-size: 10px;
    opacity: 0.45;
    margin-top: 4px;
    display: block;
  }

  .msg.user {
    background: #1f3a5f;
    border: 1px solid #1f6feb;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg.lumina {
    background: #161b22;
    border: 1px solid #30363d;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .msg.lumina .sender {
    font-size: 11px;
    color: #58a6ff;
    font-weight: 600;
    margin-bottom: 4px;
    display: block;
  }

  .msg.system {
    background: transparent;
    border: none;
    align-self: center;
    font-size: 11px;
    color: #8b949e;
    font-style: italic;
  }

  .msg.error {
    background: #2d1215;
    border: 1px solid #f85149;
    align-self: center;
    color: #f85149;
    font-size: 12px;
  }

  /* typing indicator */
  .typing-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #8b949e;
    margin: 0 2px;
    animation: typing 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,60%,100% { opacity: 0.2; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }

  /* ── Quick Actions ── */
  #quick-actions {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    flex-wrap: wrap;
    border-top: 1px solid #21262d;
    background: #0d1117;
    flex-shrink: 0;
  }

  .qa-btn {
    background: #161b22;
    border: 1px solid #30363d;
    color: #8b949e;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .qa-btn:hover {
    border-color: #58a6ff;
    color: #58a6ff;
    background: #1f3a5f20;
  }

  /* ── Input ── */
  #input-area {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: #161b22;
    border-top: 1px solid #30363d;
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e6edf3;
    padding: 8px 12px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    resize: none;
    font-family: inherit;
    line-height: 1.4;
    min-height: 36px;
    max-height: 120px;
  }

  #msg-input:focus { border-color: #58a6ff; }
  #msg-input::placeholder { color: #484f58; }

  #send-btn {
    background: #1f6feb;
    border: none;
    border-radius: 8px;
    color: #fff;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    align-self: flex-end;
    flex-shrink: 0;
  }

  #send-btn:hover { background: #388bfd; }
  #send-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
</style>
</head>
<body>

<div id="header">
  <h1>Lumina</h1>
  <span id="status-label">connecting...</span>
  <div id="status-indicator"></div>
</div>

<div id="messages">
  <div class="msg system">Session started — Lumina is ready.</div>
</div>

<div id="quick-actions">
  <button class="qa-btn" onclick="sendQuick('Morning briefing')">Morning briefing</button>
  <button class="qa-btn" onclick="sendQuick('Status check')">Status check</button>
  <button class="qa-btn" onclick="sendQuick(&quot;What&apos;s in my inbox?&quot;)">What's in my inbox?</button>
  <button class="qa-btn" onclick="sendQuick('Run health check')">Run health check</button>
</div>

<div id="input-area">
  <textarea id="msg-input" placeholder="Message Lumina..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
const GATEWAY = window.LUMINA_GATEWAY_URL || '';
const GATEWAY_AUTH = window.LUMINA_GATEWAY_KEY || '';

// Generate or restore session ID
let sessionId = sessionStorage.getItem('lumina_session');
if (!sessionId) {
  sessionId = 'chat-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now();
  sessionStorage.setItem('lumina_session', sessionId);
}

const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');
const statusDot  = document.getElementById('status-indicator');
const statusLbl  = document.getElementById('status-label');

// ── Connectivity probe ──
async function probeGateway() {
  try {
    const r = await fetch(`${GATEWAY}/health`, { signal: AbortSignal.timeout(4000) });
    if (r.ok) {
      setStatus(true);
    } else {
      setStatus(false);
    }
  } catch {
    setStatus(false);
  }
}

function setStatus(online) {
  if (online) {
    statusDot.className = 'pulse';
    statusLbl.textContent = 'connected';
    statusDot.style.background = '#3fb950';
  } else {
    statusDot.className = 'offline';
    statusLbl.textContent = 'offline';
  }
}

probeGateway();
setInterval(probeGateway, 30000);

// ── Helpers ──
function ts() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function appendMsg(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'lumina') {
    div.innerHTML = `<span class="sender">Lumina</span>${escapeHtml(text)}<span class="ts">${ts()}</span>`;
  } else if (role === 'user') {
    div.innerHTML = `${escapeHtml(text)}<span class="ts">${ts()}</span>`;
  } else if (role === 'error') {
    div.textContent = text;
  } else {
    div.textContent = text;
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;')
          .replace(/\n/g,'<br>');
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg lumina';
  div.id = 'typing-indicator';
  div.innerHTML = `<span class="sender">Lumina</span>` +
    `<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ── Send ──
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  appendMsg(text, 'user');
  sendBtn.disabled = true;
  showTyping();

  try {
    const resp = await fetch(`${GATEWAY}/api/chat`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-API-Key': GATEWAY_AUTH
      },
      body: JSON.stringify({ message: text, session_id: sessionId }),
      signal: AbortSignal.timeout(15000)
    });

    removeTyping();

    if (resp.ok) {
      const data = await resp.json();
      appendMsg(data.response || '(no response)', 'lumina');
    } else {
      appendMsg(`Gateway error: ${resp.status} ${resp.statusText}`, 'error');
    }
  } catch (err) {
    removeTyping();
    appendMsg(`Connection failed: ${err.message}`, 'error');
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function sendQuick(text) {
  inputEl.value = text;
  sendMessage();
}

// ── Enter to send (Shift+Enter for newline) ──
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.focus();
</script>
</body>
</html>
