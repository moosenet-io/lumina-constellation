<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki — Soma</title>
<link rel="stylesheet" href="/shared/constellation.css">
<script src="/shared/htmx.min.js"></script>
<style>
  .wiki-sidebar { width:220px;flex-shrink:0;overflow-y:auto;padding:1rem; }
  .wiki-content { flex:1;padding:1.5rem;max-width:800px; }
  .wiki-nav-item { display:block;padding:0.3rem 0.5rem;border-radius:4px;text-decoration:none;color:var(--text-secondary);font-size:0.875rem;cursor:pointer; }
  .wiki-nav-item:hover,.wiki-nav-item.active { background:var(--bg-tertiary);color:var(--text-primary); }
  .wiki-nav-section { font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-tertiary);padding:0.75rem 0.5rem 0.25rem;margin-top:0.5rem; }
  .wiki-content h1{font-size:1.5rem;font-weight:700;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border-color);}
  .wiki-content h2{font-size:1.125rem;font-weight:700;margin:1.5rem 0 0.75rem;}
  .wiki-content h3{font-size:1rem;font-weight:600;margin:1.25rem 0 0.5rem;}
  .wiki-content p{margin:0 0 1rem;line-height:1.7;}
  .wiki-content ul,.wiki-content ol{margin:0 0 1rem 1.5rem;}
  .wiki-content li{margin-bottom:0.25rem;}
  .wiki-content code{background:var(--bg-tertiary);padding:0.125rem 0.375rem;border-radius:4px;font-family:monospace;font-size:0.875em;}
  .wiki-content pre{background:var(--bg-tertiary);padding:1rem;border-radius:8px;overflow-x:auto;margin-bottom:1rem;}
  .wiki-content pre code{background:none;padding:0;}
  .wiki-content table{width:100%;border-collapse:collapse;margin-bottom:1rem;}
  .wiki-content th{background:var(--bg-tertiary);padding:0.5rem;text-align:left;border-bottom:1px solid var(--border-color);}
  .wiki-content td{padding:0.5rem;border-bottom:1px solid var(--border-color);}
  .wiki-content a{color:var(--accent);}
</style>
</head>
<body>
<div style="display:flex;height:100vh;overflow:hidden;">
  <nav class="wiki-sidebar card" style="margin:1rem 0 1rem 1rem;">
    <div style="font-weight:700;margin-bottom:1rem;">&#128218; Wiki</div>
    <div style="margin-bottom:0.75rem;">
      <input type="text" id="wiki-search" placeholder="Search..." oninput="searchWiki(this.value)"
        style="width:100%;padding:0.375rem 0.5rem;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-secondary);color:var(--text-primary);font-size:0.8125rem;">
    </div>
    <div id="wiki-nav">Loading...</div>
  </nav>
  <main class="wiki-content" id="wiki-main" style="overflow-y:auto;">
    <div style="color:var(--text-secondary);text-align:center;padding:3rem;">
      Select a page from the sidebar to begin.
    </div>
  </main>
</div>

<script>
let allPages = [];

// Load navigation
fetch('/api/wiki/pages')
  .then(r => r.json())
  .then(data => {
    allPages = data.pages || [];
    renderNav(allPages);
    // Load first page automatically
    if (allPages.length > 0) loadPage(allPages[0].path);
  })
  .catch(e => {
    document.getElementById('wiki-nav').innerHTML = '<div style="color:var(--text-secondary);font-size:0.875rem;">No wiki pages found.<br>Add .md files to /opt/lumina-fleet/soma/wiki/</div>';
  });

function renderNav(pages) {
  const nav = document.getElementById('wiki-nav');
  const sections = {};
  pages.forEach(p => {
    const section = p.section || 'root';
    if (!sections[section]) sections[section] = [];
    sections[section].push(p);
  });

  let html = '';
  Object.entries(sections).forEach(([section, items]) => {
    if (section !== 'root') {
      html += `<div class="wiki-nav-section">${section.replace(/-/g,' ')}</div>`;
    }
    items.forEach(item => {
      html += `<a class="wiki-nav-item" onclick="loadPage('${item.path}')" id="nav-${item.path.replace(/[/.]/g,'-')}">${item.title}</a>`;
    });
  });
  nav.innerHTML = html || '<div style="color:var(--text-secondary);font-size:0.875rem;">No pages yet</div>';
}

function loadPage(path) {
  // Update active state
  document.querySelectorAll('.wiki-nav-item').forEach(el => el.classList.remove('active'));
  const navItem = document.getElementById('nav-' + path.replace(/[/.]/g, '-'));
  if (navItem) navItem.classList.add('active');

  document.getElementById('wiki-main').innerHTML = '<div style="color:var(--text-secondary);padding:2rem;">Loading...</div>';

  fetch('/api/wiki/' + path)
    .then(r => r.json())
    .then(data => {
      document.getElementById('wiki-main').innerHTML =
        `<div class="wiki-content">${data.html}</div>`;
    })
    .catch(e => {
      document.getElementById('wiki-main').innerHTML =
        `<div class="alert-error">Failed to load page: ${e.message}</div>`;
    });
}

function searchWiki(query) {
  if (!query.trim()) { renderNav(allPages); return; }
  const q = query.toLowerCase();
  const filtered = allPages.filter(p => p.title.toLowerCase().includes(q) || p.path.toLowerCase().includes(q));
  renderNav(filtered);
}
</script>
</body>
</html>
