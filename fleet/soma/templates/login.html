<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina — Sign In</title>
<link rel="stylesheet" href="/shared/constellation.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-wrap { width: 100%; max-width: 380px; padding: 1rem; }
  .login-header { text-align: center; margin-bottom: 2rem; }
  .login-header .brand { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
  .login-header .brand-dot { color: var(--accent); }
  .login-header .subtitle { color: var(--text-secondary); margin-top: 0.25rem; font-size: 0.9rem; }
  .login-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 2rem; }
  .form-group { margin-bottom: 1.25rem; }
  .form-group label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; }
  .form-group input { width: 100%; padding: 0.6rem 0.75rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 5px; color: var(--text-primary); font-size: 0.95rem; box-sizing: border-box; }
  .form-group input:focus { outline: none; border-color: var(--accent); }
  .btn-login { width: 100%; padding: 0.7rem; background: var(--accent); color: #000; border: none; border-radius: 5px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
  .btn-login:hover { opacity: 0.9; }
  .alert-error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 0.65rem 0.85rem; border-radius: 5px; font-size: 0.875rem; margin-bottom: 1.25rem; }
  .footer-note { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-header">
    <div class="brand"><span class="brand-dot">◉</span> Lumina</div>
    <div class="subtitle">Constellation Admin</div>
  </div>

  <div class="login-card">
    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
  </div>

  <div class="footer-note">Lumina Constellation · Private homelab deployment</div>
</div>
</body>
</html>
