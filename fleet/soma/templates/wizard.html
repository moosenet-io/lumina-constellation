<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina — Setup</title>
  <link rel="stylesheet" href="/shared/constellation.css">
  <script src="http://192.168.0.120/shared/htmx.min.js"></script>
</head>
<body hx-headers='{"X-Soma-Key": "YOUR_SOMA_ADMIN_KEY"}' style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">

  <!-- FIX 4a: Back to Dashboard link -->
  <div style="position:fixed;top:1rem;left:1rem;z-index:100;">
    <a href="/status" style="color:var(--text-secondary);text-decoration:none;font-size:0.875rem;">
      &#8592; Back to Dashboard
    </a>
  </div>

  <div style="max-width:640px;width:100%;" id="wizard">
    <!-- Progress bar -->
    <div style="margin-bottom:2rem;">
      <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;">
        <span id="step-label" style="color:var(--text-secondary);font-size:0.875rem;">Step 1 of 10</span>
        <span id="step-pct" style="color:var(--text-secondary);font-size:0.875rem;">0%</span>
      </div>
      <div style="background:var(--bg-tertiary);border-radius:4px;height:6px;">
        <div id="progress-bar" style="background:var(--accent);height:100%;border-radius:4px;transition:width 0.3s;width:0%"></div>
      </div>
    </div>

    <!-- Step container -->
    <div id="step-content" class="card"></div>

    <!-- Navigation -->
    <div style="display:flex;gap:1rem;margin-top:1.5rem;justify-content:space-between;">
      <button id="btn-back" onclick="wizBack()" class="btn-secondary" style="display:none;">&#8592; Back</button>
      <div style="flex:1"></div>
      <button id="btn-skip" onclick="wizSkip()" class="btn-secondary" style="display:none;">Skip</button>
      <button id="btn-next" onclick="wizNext()" class="btn-primary">Next &#8594;</button>
    </div>
  </div>

<script>
// Wizard state — persists to localStorage
const WIZ_KEY = 'lumina-wizard-state';
let state = JSON.parse(localStorage.getItem(WIZ_KEY) || '{}');
let currentStep = state.step || 1;
const TOTAL_STEPS = 10;

function saveState() {
  state.step = currentStep;
  localStorage.setItem(WIZ_KEY, JSON.stringify(state));
}

function updateProgress() {
  const pct = Math.round(((currentStep - 1) / TOTAL_STEPS) * 100);
  document.getElementById('step-label').textContent = 'Step ' + currentStep + ' of ' + TOTAL_STEPS;
  document.getElementById('step-pct').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('btn-back').style.display = currentStep > 1 ? 'block' : 'none';
}

// FIX 4c: Validated wizNext
function wizNext() {
  // Step 1.5 — disclaimer required
  if (currentStep === 2) {
    if (!state.disclaimerAccepted) {
      var el = document.getElementById('disclaimer-err');
      if (el) el.style.display = 'block';
      return;
    }
    // Record acceptance via API
    fetch('/api/setup/accept-disclaimer', {method:'POST', headers:{'X-Soma-Key': window._somaKey || ''}}).catch(function(){});
  }
  // Step 3 (was 2) — name validation
  if (currentStep === 3) {
    const name = document.getElementById('assistant-name')?.value?.trim();
    if (!name || name.length < 2 || name.length > 30) {
      document.getElementById('name-preview').textContent = '⚠️ Name must be 2-30 characters.';
      document.getElementById('name-preview').style.color = 'var(--danger, #f85149)';
      return;
    }
    state.name = name;
    saveState();
  }
  if (currentStep < TOTAL_STEPS) {
    currentStep++;
    saveState();
    renderStep(currentStep);
  } else {
    wizLaunch();
  }
}

function wizBack() {
  if (currentStep > 1) {
    currentStep--;
    saveState();
    renderStep(currentStep);
  }
}

function wizSkip() {
  wizNext();
}

// FIX 4b: Reset wizard function
function resetWizard() {
  if (confirm('Reset wizard? This will clear all entered data.')) {
    localStorage.removeItem(CHAT_HISTORY_KEY);
    localStorage.removeItem(WIZ_KEY);
    location.reload();
  }
}

// Render each step
function renderStep(n) {
  updateProgress();
  const steps = [null, step1, step1b, step2, step3, step4, step5, step5b, step6, step7, step8];
  document.getElementById('step-content').innerHTML = steps[n]();

  // Re-process HTMX on new content
  if (window.htmx) htmx.process(document.getElementById('step-content'));

  // Update next button text
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = n === TOTAL_STEPS ? 'Launch Lumina' : 'Next \u2192';

  // Show/hide skip for optional steps
  document.getElementById('btn-skip').style.display = [7, 8].includes(n) ? 'block' : 'none';
}

// ── Step 1: Welcome ────────────────────────────────────────────────────────
function step1() {
  return '<div style="text-align:center;padding:2rem;">' +
    '<div style="font-size:3rem;margin-bottom:1rem;">&#x2B21;</div>' +
    '<h1 style="font-size:1.75rem;font-weight:700;margin-bottom:0.75rem;">Welcome to Lumina Constellation</h1>' +
    '<p style="color:var(--text-secondary);margin-bottom:2rem;line-height:1.6;">' +
    'A personality-first AI personal assistant — 25 modules, under a dollar a day.<br>' +
    'This wizard will set up your constellation in about 5 minutes.' +
    '</p>' +
    '<div class="alert-info" style="text-align:left;">' +
    '<strong>What we\'ll configure:</strong>' +
    '<ul style="margin:0.5rem 0 0 1.25rem;">' +
    '<li>Your assistant\'s name and personality</li>' +
    '<li>Chat channel connection (Matrix recommended)</li>' +
    '<li>AI inference provider</li>' +
    '<li>Optional integrations (Calendar, Groceries, Budget...)</li>' +
    '</ul>' +
    '</div>' +
    '<div style="margin-top:1rem;">' +
    '<button onclick="resetWizard()" style="background:none;border:1px solid var(--border-color);border-radius:6px;padding:0.375rem 0.75rem;cursor:pointer;font-size:0.875rem;color:var(--text-secondary);margin-top:0.5rem;">&#x21BA; Reset wizard</button>' +
    '</div>' +
    '</div>';
}

// ── Step 1.5: Disclaimer ───────────────────────────────────────────────────
function step1b() {
  var accepted = state.disclaimerAccepted || false;
  return '<div style="padding:1rem;">' +
    '<h2 style="font-size:1.375rem;font-weight:700;margin-bottom:0.5rem;">Terms of Use &amp; Disclaimer</h2>' +
    '<div style="background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:8px;padding:1.25rem;margin-bottom:1.25rem;font-size:0.875rem;line-height:1.7;color:var(--text-secondary);">' +
    '<p><strong style="color:var(--text-primary);">Lumina Constellation is experimental software.</strong> Please read and accept:</p>' +
    '<ul style="margin:0.75rem 0 0 1.25rem;display:flex;flex-direction:column;gap:0.4rem;">' +
    '<li>AI responses may be inaccurate — always verify important decisions independently.</li>' +
    '<li><strong>Meridian</strong> (trading module) is for paper trading only — not financial advice.</li>' +
    '<li><strong>Vitals</strong> (health module) is for tracking only — not medical advice.</li>' +
    '<li>The operator is responsible for securing their deployment, credentials, and data.</li>' +
    '<li>Data stays on the operator\'s hardware — no cloud telemetry is sent to any third party.</li>' +
    '<li>Open source software — provided as-is, without warranty of any kind.</li>' +
    '</ul>' +
    '</div>' +
    '<label style="display:flex;align-items:flex-start;gap:0.75rem;cursor:pointer;">' +
    '<input type="checkbox" id="disclaimer-check" ' + (accepted ? 'checked' : '') + ' style="margin-top:0.25rem;width:1.1rem;height:1.1rem;" onchange="state.disclaimerAccepted=this.checked;saveState();document.getElementById(\'disclaimer-err\').style.display=\'none\';">' +
    '<span style="font-size:0.875rem;">I understand and accept these terms.</span>' +
    '</label>' +
    '<div id="disclaimer-err" style="display:none;color:var(--danger,#f85149);font-size:0.875rem;margin-top:0.5rem;">Please accept the terms to continue.</div>' +
    '</div>';
}

// ── Step 2: Naming ceremony ────────────────────────────────────────────────
function step2() {
  const saved = (state.name || '').replace(/"/g, '&quot;');
  const suggestions = ['Lumina','Nova','Atlas','Echo','Iris','Orion','Vega','Sol'];
  const badges = suggestions.map(function(n) {
    return '<button onclick="setName(\'' + n + '\')" class="badge-info" style="cursor:pointer;border:none;padding:0.25rem 0.75rem;">' + n + '</button>';
  }).join('');
  return '<div style="padding:1rem;">' +
    '<h2 style="font-size:1.375rem;font-weight:700;margin-bottom:0.5rem;">Name your assistant</h2>' +
    '<p style="color:var(--text-secondary);margin-bottom:1.5rem;">Your assistant is a character with a persistent identity. Choose a name that feels right.</p>' +
    '<div style="margin-bottom:1rem;">' +
    '<label style="display:block;font-weight:600;margin-bottom:0.5rem;">Assistant name</label>' +
    '<input type="text" id="assistant-name" value="' + saved + '" placeholder="e.g. Lumina, Nova, Atlas, Echo..."' +
    ' style="width:100%;padding:0.75rem;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-size:1rem;box-sizing:border-box;"' +
    ' oninput="updateNamePreview()">' +
    '</div>' +
    '<p id="name-preview" style="color:var(--accent);font-weight:600;min-height:1.5rem;">' +
    (state.name ? 'Your assistant will be called "' + state.name + '"' : '') +
    '</p>' +
    '<div class="card" style="margin-top:1rem;background:var(--bg-secondary);">' +
    '<div style="font-size:0.75rem;color:var(--text-tertiary);margin-bottom:0.5rem;">Suggested names</div>' +
    '<div style="display:flex;gap:0.5rem;flex-wrap:wrap;">' + badges + '</div>' +
    '</div>' +
    '</div>';
}

function updateNamePreview() {
  var input = document.getElementById('assistant-name');
  var preview = document.getElementById('name-preview');
  if (!input || !preview) return;
  var name = input.value || '';
  preview.textContent = name ? 'Your assistant will be called "' + name + '"' : '';
  preview.style.color = 'var(--accent)';
  state.name = name;
  saveState();
}

function setName(name) {
  var input = document.getElementById('assistant-name');
  if (input) { input.value = name; updateNamePreview(); }
}

// ── Step 3: Infrastructure scan ────────────────────────────────────────────
function step3() {
  return '<div style="padding:1rem;">' +
    '<h2 style="font-size:1.375rem;font-weight:700;margin-bottom:0.5rem;">Scanning infrastructure</h2>' +
    '<p style="color:var(--text-secondary);margin-bottom:1.5rem;">Checking that core services are reachable. This takes a few seconds.</p>' +
    '<div id="scan-results"' +
    ' hx-get="/api/status"' +
    ' hx-trigger="load"' +
    ' hx-swap="innerHTML">' +
    '<div style="text-align:center;padding:2rem;color:var(--text-secondary);">' +
    '<div style="margin-bottom:0.5rem;">&#x29D6; Scanning...</div>' +
    '<div style="font-size:0.875rem;">Checking LiteLLM, Postgres, Terminus...</div>' +
    '</div>' +
    '</div>' +
    '</div>';
}

// Format scan results from raw JSON into a checklist (handles both old checks{} and new services{} format)
document.addEventListener('htmx:afterSwap', function(e) {
  if (!e.detail.elt || e.detail.elt.id !== 'scan-results') return;
  try {
    const status = JSON.parse(e.detail.elt.innerText);
    // New format: status.services = {name: {name, ok, latency_ms, ...}}
    // Old format: status.checks = {key: {ok, value, error}}
    const services = status.services || {};
    const checks = status.checks || {};
    const items = Object.keys(services).length > 0 ? services : checks;
    const isNew = Object.keys(services).length > 0;

    let html = '<div style="display:flex;flex-direction:column;gap:0.5rem;">';
    for (const [key, svc] of Object.entries(items)) {
      const label = isNew ? (svc.name || key) : (key.replace(/_/g,' '));
      const ok = svc.ok;
      const dot = ok ? '&#x1F7E2;' : '&#x1F534;';
      const latency = svc.latency_ms != null ? svc.latency_ms + 'ms' : '';
      const extra = isNew ? (ok ? latency : (svc.error || 'unreachable')) : (ok ? (svc.value || '') : (svc.error || 'unreachable'));
      html += '<div style="display:flex;align-items:center;gap:0.75rem;padding:0.4rem 0;">' +
        '<span style="font-size:1.1rem;">' + dot + '</span>' +
        '<div><div style="font-weight:600;font-size:0.875rem;">' + label + '</div>' +
        '<div style="font-size:0.75rem;color:var(--text-secondary);">' + String(extra).slice(0,60) + '</div></div></div>';
    }
    const allOk = Object.values(items).every(function(c) { return c.ok; });
    const level = status.status_level || (allOk ? 'ok' : 'degraded');
    const bg = level === 'ok' ? 'rgba(34,197,94,0.1)' : 'var(--bg-tertiary)';
    const label = status.status || (allOk ? '&#x2705; All systems ready' : '&#x26A0; Some services unavailable');
    html += '<div style="margin-top:1rem;padding:0.75rem;border-radius:8px;background:' + bg + ';">' +
      '<strong>' + label + '</strong>' +
      '<div style="font-size:0.75rem;color:var(--text-secondary);margin-top:0.25rem;">Minimum required: IronClaw + LiteLLM</div></div>';
    html += '</div>';
    e.detail.elt.innerHTML = html;
  } catch(err) {
    // keep raw if parse fails — better than crashing
  }
});

// ── Step 4: Chat connection ────────────────────────────────────────────────
function step4() {
  var saved = state.chat_platform || 'matrix';
  var platforms = [
    ['matrix', '&#x1F537; Matrix (Element X)', 'Recommended — self-hosted, private, supports rich formatting'],
    ['telegram', '&#x2708;&#xFE0F; Telegram', 'Easy setup — requires a bot token'],
    ['discord', '&#x1F4AC; Discord', 'Good for teams — requires bot setup'],
    ['signal', '&#x1F512; Signal', 'Most private — requires Signal CLI'],
  ];
  var cards = platforms.map(function(p) {
    var val = p[0], label = p[1], desc = p[2];
    var border = saved === val ? 'border:2px solid var(--accent);' : 'border:1px solid var(--border-color);';
    return '<label style="cursor:pointer;" onclick="selectPlatform(\'' + val + '\')">' +
      '<div id="platform-card-' + val + '" class="card" style="display:flex;gap:1rem;align-items:flex-start;padding:1rem;' + border + '">' +
      '<input type="radio" name="chat" value="' + val + '" ' + (saved === val ? 'checked' : '') + ' style="margin-top:0.25rem;">' +
      '<div>' +
      '<div style="font-weight:600;">' + label + '</div>' +
      '<div style="font-size:0.875rem;color:var(--text-secondary);">' + desc + '</div>' +
      '</div>' +
      '</div>' +
      '</label>';
  }).join('');
  return '<div style="padding:1rem;">' +
    '<h2 style="font-size:1.375rem;font-weight:700;margin-bottom:0.5rem;">Connect your chat platform</h2>' +
    '<p style="color:var(--text-secondary);margin-bottom:1.5rem;">Choose how you\'ll talk to your assistant.</p>' +
    '<div style="display:flex;flex-direction:column;gap:0.75rem;">' + cards + '</div>' +
    '</div>';
}

function selectPlatform(val) {
  state.chat_platform = val;
  saveState();
  ['matrix','telegram','discord','signal'].forEach(function(p) {
    var card = document.getElementById('platform-card-' + p);
    if (card) card.style.border = p === val ? '2px solid var(--accent)' : '1px solid var(--border-color)';
    var radio = card ? card.querySelector('input[type=radio]') : null;
    if (radio) radio.checked = p === val;
  });
}

// ── Step 5: LLM config ─────────────────────────────────────────────────────
function step5() {
  var keyVal = (state.anthropic_key || '').replace(/"/g, '&quot;');
  return '<div style="padding:1rem;">' +
    '<h2 style="font-size:1.375rem;font-weight:700;margin-bottom:0.5rem;">AI inference provider</h2>' +
    '<p style="color:var(--text-secondary);margin-bottom:1.5rem;">Your constellation routes most work to local models. Cloud inference handles reasoning tasks only.</p>' +
    '<div style="display:flex;flex-direction:column;gap:1rem;">' +
    '<div class="card" style="padding:1rem;">' +
    '<div style="font-weight:600;margin-bottom:0.75rem;">&#x1F916; Claude (Anthropic)</div>' +
    '<label style="font-size:0.875rem;color:var(--text-secondary);display:block;margin-bottom:0.4rem;">API Key</label>' +
    '<input type="password" id="anthropic-key" placeholder="sk-ant-..." value="' + keyVal + '"' +
    ' style="width:100%;padding:0.5rem;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-secondary);color:var(--text-primary);box-sizing:border-box;"' +
    ' oninput="state.anthropic_key=this.value;saveState();">' +
    '<div style="font-size:0.75rem;color:var(--text-tertiary);margin-top:0.4rem;">Get your key at console.anthropic.com</div>' +
    '</div>' +
    '<div style="text-align:center;color:var(--text-tertiary);font-size:0.875rem;">' +
    'Already configured your LiteLLM proxy? ' +
    '<a href="#" style="color:var(--accent);" onclick="state.litellm_configured=true;saveState();wizNext();return false;">Skip — use existing proxy &#8594;</a>' +
    '</div>' +
    '</div>' +
    '</div>';
}

// ── Step 5b: Ollama model provisioning ────────────────────────────────────
function step5b() {
  return '<div style="padding:1rem;">' +
    '<h2 style="font-size:1.375rem;font-weight:700;margin-bottom:0.5rem;">Local model check <span class="badge-secondary">Optional</span></h2>' +
    '<p style="color:var(--text-secondary);margin-bottom:1.25rem;">Checking which Ollama models are installed and comparing against your LiteLLM config.</p>' +
    '<div id="ollama-results" style="min-height:80px;">' +
    '<div style="text-align:center;padding:1.5rem;color:var(--text-secondary);">&#x29D6; Querying Ollama...</div>' +
    '</div>' +
    '<div id="ollama-provision" style="display:none;margin-top:1rem;"></div>' +
    '</div>';
}

// Load Ollama data when step5b renders
document.addEventListener('htmx:afterSwap', function() {});

function loadOllamaStatus() {
  var el = document.getElementById('ollama-results');
  if (!el) return;
  fetch('/api/setup/ollama-status', {headers: {'X-Soma-Key': window._somaKey || ''}})
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        el.innerHTML = '<div class="alert-info" style="font-size:0.875rem;">&#x26A0; Ollama not reachable at ' + (data.host || 'default host') + '. You can skip this step — models can be provisioned later from the Config page.</div>';
        return;
      }
      var installed = data.installed || [];
      var missing = data.missing || [];
      var html = '';
      if (installed.length) {
        html += '<div style="margin-bottom:1rem;">';
        html += '<div style="font-size:0.75rem;color:var(--text-tertiary);margin-bottom:0.5rem;text-transform:uppercase;font-weight:600;">Installed</div>';
        html += installed.map(function(m) {
          return '<div style="display:flex;align-items:center;gap:0.5rem;padding:0.35rem 0;font-size:0.875rem;">' +
            '<span style="color:#3fb950;">&#x2713;</span>' +
            '<span style="font-weight:600;">' + m.name + '</span>' +
            (m.size ? '<span style="color:var(--text-tertiary);font-size:0.75rem;">' + m.size + '</span>' : '') +
            '</div>';
        }).join('');
        html += '</div>';
      }
      if (missing.length) {
        html += '<div>';
        html += '<div style="font-size:0.75rem;color:var(--text-tertiary);margin-bottom:0.5rem;text-transform:uppercase;font-weight:600;">Recommended for Lumina</div>';
        html += missing.map(function(m) {
          return '<div style="display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;font-size:0.875rem;border-bottom:1px solid var(--bg-tertiary);">' +
            '<div>' +
            '<span style="color:var(--text-secondary);">&#x25CB; ' + m.name + '</span>' +
            (m.size ? '<span style="color:var(--text-tertiary);font-size:0.75rem;margin-left:0.5rem;">' + m.size + '</span>' : '') +
            (m.note ? '<div style="font-size:0.72rem;color:var(--text-tertiary);">' + m.note + '</div>' : '') +
            '</div>' +
            '<button onclick="pullOllamaModel(\'' + m.name + '\',this)" style="font-size:0.75rem;padding:0.25rem 0.6rem;border:1px solid var(--accent);border-radius:4px;background:none;color:var(--accent);cursor:pointer;">Pull</button>' +
            '</div>';
        }).join('');
        html += '</div>';
      }
      if (!installed.length && !missing.length) {
        html = '<div style="color:var(--text-tertiary);font-size:0.875rem;">No model recommendations — Ollama is running but no gaps detected.</div>';
      }
      el.innerHTML = html;
    })
    .catch(function(e) {
      el.innerHTML = '<div class="alert-info" style="font-size:0.875rem;">&#x26A0; Could not reach Ollama endpoint. Skip this step to continue — models can be added later.</div>';
    });
}

function pullOllamaModel(name, btn) {
  btn.textContent = 'Pulling...';
  btn.disabled = true;
  fetch('/api/setup/ollama-pull', {
    method: 'POST',
    headers: {'Content-Type':'application/json','X-Soma-Key': window._somaKey || ''},
    body: JSON.stringify({model: name})
  }).then(function(r) { return r.json(); }).then(function(data) {
    btn.textContent = data.ok ? '&#x2713; Queued' : 'Failed';
    btn.style.color = data.ok ? '#3fb950' : 'var(--danger,#f85149)';
  }).catch(function() { btn.textContent = 'Error'; });
}

// Auto-load Ollama status when step5b is rendered
var _origRenderStep = renderStep;
renderStep = function(n) {
  _origRenderStep(n);
  if (n === 7) { setTimeout(loadOllamaStatus, 50); }
};

// ── Step 6: Google integration (optional) ─────────────────────────────────
function step6() {
  var emailVal = (state.google_email || '').replace(/"/g, '&quot;');
  var passVal = (state.google_pass || '').replace(/"/g, '&quot;');
  return '<div style="padding:1rem;">' +
    '<h2 style="font-size:1.375rem;font-weight:700;margin-bottom:0.5rem;">Google Calendar &amp; Email <span class="badge-secondary">Optional</span></h2>' +
    '<p style="color:var(--text-secondary);margin-bottom:1.5rem;">Connect your calendar and email for briefings. Uses an App Password — not your main password.</p>' +
    '<div style="display:flex;flex-direction:column;gap:1rem;">' +
    '<div>' +
    '<label style="font-weight:600;display:block;margin-bottom:0.4rem;">Gmail address</label>' +
    '<input type="email" id="google-email" placeholder="your.email@example.com" value="' + emailVal + '"' +
    ' style="width:100%;padding:0.5rem;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-secondary);color:var(--text-primary);box-sizing:border-box;"' +
    ' oninput="state.google_email=this.value;saveState();">' +
    '</div>' +
    '<div>' +
    '<label style="font-weight:600;display:block;margin-bottom:0.4rem;">App Password</label>' +
    '<input type="password" id="google-pass" placeholder="xxxx xxxx xxxx xxxx" value="' + passVal + '"' +
    ' style="width:100%;padding:0.5rem;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-secondary);color:var(--text-primary);box-sizing:border-box;"' +
    ' oninput="state.google_pass=this.value;saveState();">' +
    '<div style="font-size:0.75rem;color:var(--text-tertiary);margin-top:0.25rem;">' +
    'Get this from myaccount.google.com &#8594; Security &#8594; 2FA &#8594; App passwords' +
    '</div>' +
    '</div>' +
    '</div>' +
    '</div>';
}

// ── Step 7: Module selection ───────────────────────────────────────────────
var MODULE_LIST = [
  {id:'hearth',  label:'&#x1F957; Hearth',   desc:'Kitchen &amp; grocery (Grocy)'},
  {id:'ledger',  label:'&#x1F4B0; Ledger',   desc:'Personal finance (Actual Budget)'},
  {id:'relay',   label:'&#x1F697; Relay',    desc:'Vehicle maintenance (LubeLogger)'},
  {id:'odyssey', label:'&#x2708;&#xFE0F; Odyssey', desc:'Travel &amp; points optimizer'},
  {id:'vitals',  label:'&#x2764;&#xFE0F; Vitals',  desc:'Health tracking'},
  {id:'crucible',label:'&#x1F4DA; Crucible', desc:'Learning tracker'},
  {id:'meridian',label:'&#x1F4C8; Meridian', desc:'Paper trading sandbox'},
  {id:'seer',    label:'&#x1F50D; Seer',     desc:'Web research (SearXNG)'},
];

function step7() {
  var enabled = state.modules || {};
  var coreModules = ['&#x2B21; Nexus', '&#x26A1; Axon', '&#x1F9E0; Engram', '&#x1F305; Vigil', '&#x1F6E1;&#xFE0F; Sentinel'];
  var coreBadges = coreModules.map(function(m) {
    return '<span class="badge-success">' + m + '</span>';
  }).join('');
  var optCards = MODULE_LIST.map(function(m) {
    var checked = enabled[m.id] ? 'checked' : '';
    var border = enabled[m.id] ? 'border:1px solid var(--accent);' : '';
    return '<label style="cursor:pointer;">' +
      '<div id="mod-card-' + m.id + '" class="card" style="padding:0.75rem;display:flex;gap:0.75rem;align-items:center;' + border + '">' +
      '<input type="checkbox" ' + checked + ' onchange="toggleModule(\'' + m.id + '\',this.checked)" style="width:16px;height:16px;flex-shrink:0;">' +
      '<div>' +
      '<div style="font-weight:600;font-size:0.875rem;">' + m.label + '</div>' +
      '<div style="font-size:0.75rem;color:var(--text-secondary);">' + m.desc + '</div>' +
      '</div>' +
      '</div>' +
      '</label>';
  }).join('');
  return '<div style="padding:1rem;">' +
    '<h2 style="font-size:1.375rem;font-weight:700;margin-bottom:0.5rem;">Enable modules</h2>' +
    '<p style="color:var(--text-secondary);margin-bottom:0.75rem;">Core modules are always on. Enable lifestyle modules as needed.</p>' +
    '<div style="margin-bottom:1rem;padding:0.75rem;border-radius:8px;background:var(--bg-secondary);">' +
    '<div style="font-size:0.75rem;color:var(--text-tertiary);margin-bottom:0.5rem;">Always enabled</div>' +
    '<div style="display:flex;gap:0.5rem;flex-wrap:wrap;">' + coreBadges + '</div>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">' + optCards + '</div>' +
    '</div>';
}

function toggleModule(id, enabled) {
  if (!state.modules) state.modules = {};
  state.modules[id] = enabled;
  saveState();
  var card = document.getElementById('mod-card-' + id);
  if (card) card.style.border = enabled ? '1px solid var(--accent)' : '';
}

// ── Step 8: Launch ─────────────────────────────────────────────────────────
function step8() {
  var chatPlatform = state.chat_platform || 'Matrix';
  var googleStatus = state.google_email ? '&#x2713; Configured' : '&#x25CB; Skipped';
  var modCount = Object.values(state.modules || {}).filter(Boolean).length + 5;
  // FIX 4d: warn if name not set
  var displayName = state.name && state.name.trim() ? state.name.trim() : '&#x26A0;&#xFE0F; No name set (go back to Step 2)';
  return '<div style="text-align:center;padding:2rem;">' +
    '<div style="font-size:3rem;margin-bottom:1rem;">&#x2B21;</div>' +
    '<h2 style="font-size:1.5rem;font-weight:700;margin-bottom:0.75rem;">Ready to launch ' + displayName + '</h2>' +
    '<p style="color:var(--text-secondary);margin-bottom:2rem;line-height:1.6;">' +
    'Here\'s what will be configured when you click Launch:' +
    '</p>' +
    '<div class="card" style="text-align:left;margin-bottom:1.5rem;">' +
    '<div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border-color);">' +
    '<span style="color:var(--text-secondary);">Assistant name</span>' +
    '<span style="font-weight:600;">' + displayName + '</span>' +
    '</div>' +
    '<div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border-color);">' +
    '<span style="color:var(--text-secondary);">Chat platform</span>' +
    '<span style="font-weight:600;">' + chatPlatform + '</span>' +
    '</div>' +
    '<div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border-color);">' +
    '<span style="color:var(--text-secondary);">Google integration</span>' +
    '<span style="font-weight:600;">' + googleStatus + '</span>' +
    '</div>' +
    '<div style="display:flex;justify-content:space-between;padding:0.5rem 0;">' +
    '<span style="color:var(--text-secondary);">Modules enabled</span>' +
    '<span style="font-weight:600;">' + modCount + ' modules</span>' +
    '</div>' +
    '</div>' +
    '<div id="launch-status"></div>' +
    '</div>';
}

function wizLaunch() {
  var status = document.getElementById('launch-status');
  if (!status) return;
  status.innerHTML = '<div class="alert-info">Applying configuration...</div>';
  fetch('/api/wizard/apply', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-Soma-Key': 'YOUR_SOMA_ADMIN_KEY'},
    body: JSON.stringify(state)
  }).then(function(r) { return r.json(); }).then(function(data) {
    localStorage.removeItem(WIZ_KEY);
    status.innerHTML = '<div class="alert-success">&#x2713; Your constellation is ready! <a href="/" style="color:var(--accent);">Go to Dashboard &#8594;</a></div>';
    document.getElementById('btn-next').style.display = 'none';
  }).catch(function(e) {
    status.innerHTML = '<div class="alert-error">Launch failed: ' + e.message + '. Check Soma logs.</div>';
  });
}

// Initialize
renderStep(currentStep);
</script>
</body>
</html>
