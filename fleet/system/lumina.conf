<VirtualHost *:80>
    # Seer research reports
    Alias /research /opt/lumina-fleet/seer/output/html/research
    <Directory /opt/lumina-fleet/seer/output/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Sentinel status page
    Alias /status /opt/lumina-fleet/sentinel/output/html
    <Directory /opt/lumina-fleet/sentinel/output/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Vigil briefing dashboard
    Alias /briefing /opt/lumina-fleet/vigil/output/html
    <Directory /opt/lumina-fleet/vigil/output/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Commute intelligence (future)
    Alias /commute /opt/lumina-fleet/commute/output/html
    <Directory /opt/lumina-fleet/commute/output/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Crucible learning tracker
    Alias /learning /opt/lumina-fleet/crucible/output/html
    <Directory /opt/lumina-fleet/crucible/output/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Odyssey trip planning
    Alias /travel /opt/lumina-fleet/odyssey/output/html
    <Directory /opt/lumina-fleet/odyssey/output/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Meridian paper trading (SIMULATED ONLY)
    Alias /trading /opt/lumina-fleet/meridian/output/html
    <Directory /opt/lumina-fleet/meridian/output/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Vitals health tracker
    Alias /health /opt/lumina-fleet/vitals/output/html
    <Directory /opt/lumina-fleet/vitals/output/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Lumina chat widget (DASH-16/17/18)
    Alias /chat /opt/lumina-fleet/chat
    <Directory /opt/lumina-fleet/chat>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    DocumentRoot /opt/lumina-fleet/seer/output/html
    Header always set X-Content-Type-Options nosniff
</VirtualHost>
