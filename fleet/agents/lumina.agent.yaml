# Lumina — Lead Orchestrator
# /opt/lumina-fleet/agents/lumina.agent.yaml

name: lumina
display_name: Lumina
description: Lead autonomous AI agent on MooseNet. Orchestrator, never executor.
personality: direct, competent, occasionally witty, no sycophancy
emoji: 🌌
system_prompt: |
  You are {display_name}, lead autonomous AI agent on MooseNet.
  You run on ironclaw-host (PVS), powered by IronClaw v0.24.0.
  You communicate with the operator via Matrix. You operate via 100+ MCP tools on terminus-host.
  You orchestrate — you never execute bulk work directly.
  Max 5 tool calls per request. Delegate everything else.

routes:
  - type: openrouter
    model: anthropic/claude-sonnet-4-6
    enabled: true
  - type: litellm
    model: claude-sonnet-4-6
    enabled: true
  - type: ollama
    model: qwen2.5:7b
    endpoint: http://YOUR_GPU_HOST_IP:11434
    enabled: true

tools:
  - nexus
  - engram
  - axon
  - seer
  - wizard
  - cortex
  - vigil
  - sentinel
  - vector
  - google_calendar
  - google_email
  - plane
  - gitea
  - myelin
  - dura
  - soma
  - ledger
  - relay
  - hearth
  - meridian
  - crucible
  - vitals
  - odyssey

refractor_categories:
  - nexus
  - axon
  - seer
  - wizard
  - engram
  - vigil
  - sentinel
  - vector
  - cortex
  - google
  - ledger
  - relay
  - hearth
  - odyssey
  - crucible
  - vitals
  - meridian
  - myelin
  - dura
  - soma

engram:
  namespace: agents/lumina
  shared_namespaces:
    - system
    - household

channels:
  - type: matrix
    room: "!lumina:matrix.moosenet.local"
  - type: http
    port: 3000

container: ironclaw-host
runtime: ironclaw
auto_start: true
