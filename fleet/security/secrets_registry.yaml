# Lumina Constellation — Secrets Registry (SEC.1)
# Defines all managed secrets, rotation methods, and rotation schedules.
# Used by rotation.py for automated and manual rotation.
#
# Rotation methods:
#   random_hex_32   — Generate new 32-byte hex string (crypto.token_hex(32))
#   gitea_api       — Delete old token + create new via Gitea API
#   plane_api       — Delete old token + create new via Plane CE API
#   manual          — Send Matrix alert with regeneration instructions
#
# max_age_days: Warn at 80% of this, rotate at 100%
# services: Which services use this secret (for restart coordination)

secrets:

  - name: SOMA_JWT_SECRET
    description: JWT signing key for Soma admin panel authentication
    method: random_hex_32
    max_age_days: 90
    services: [soma]
    infisical_project: services
    restart_commands:
      - "systemctl restart soma"

  - name: IRONCLAW_GATEWAY_TOKEN
    description: Shared auth token between Soma and IronClaw
    method: random_hex_32
    max_age_days: 90
    services: [ironclaw, soma]
    infisical_project: ironclaw
    restart_commands:
      - "systemctl restart soma"
      # IronClaw restart requires manual step — auto-restart not safe

  - name: GITEA_TOKEN
    description: Gitea API token for agent write operations (Axon, Vigil, Sentinel)
    method: gitea_api
    max_age_days: 365
    services: [terminus, axon, vigil]
    infisical_project: services
    gitea_token_owner: moosenet
    gitea_token_name: lumina-fleet-agent
    restart_commands:
      - "systemctl restart terminus-mcp"

  - name: PLANE_API_TOKEN
    description: Plane CE API token for work item management
    method: manual
    max_age_days: 365
    services: [axon, soma, terminus]
    infisical_project: services
    manual_instructions: |
      1. Log in to Plane CE at http://YOUR_PLANE_IP
      2. Go to Settings → API Tokens → Create new token
      3. Name it "lumina-fleet-$(date +%Y%m)"
      4. Update PLANE_API_TOKEN in Infisical workspace moosenet-services

  - name: LITELLM_MASTER_KEY
    description: LiteLLM proxy master key for agent inference requests
    method: random_hex_32
    max_age_days: 180
    services: [terminus, vigil, sentinel, soma]
    infisical_project: services
    restart_commands:
      - "systemctl restart terminus-mcp"

  - name: OPENROUTER_API_KEY
    description: OpenRouter API key for multi-model routing
    method: manual
    max_age_days: 365
    services: [litellm]
    infisical_project: services
    manual_instructions: |
      1. Log in to openrouter.ai
      2. Go to Keys → Create new key
      3. Name it "lumina-$(date +%Y%m)"
      4. Update OPENROUTER_API_KEY in Infisical workspace moosenet-services
      5. Update LiteLLM config on Lumina LiteLLM proxy

  - name: INBOX_DB_PASS
    description: PostgreSQL password for Nexus inbox database
    method: manual
    max_age_days: 365
    services: [axon, nexus, soma]
    infisical_project: services
    manual_instructions: |
      1. Generate new password: openssl rand -base64 32
      2. Update in PostgreSQL: ALTER USER lumina_inbox_user PASSWORD 'new_pass';
      3. Update INBOX_DB_PASS in Infisical workspace moosenet-services
      4. Restart services: axon, nexus, soma

  - name: TOMTOM_API_KEY
    description: TomTom API key for commute route calculations
    method: manual
    max_age_days: 365
    services: [vigil, terminus]
    infisical_project: services
    manual_instructions: |
      1. Log in to developer.tomtom.com
      2. Go to My Apps → Create new app → Copy primary key
      3. Update TOMTOM_API_KEY in Infisical workspace moosenet-services

  - name: NEWS_API_KEY
    description: NewsAPI.org key for news section in briefings
    method: manual
    max_age_days: 365
    services: [vigil, terminus]
    infisical_project: services
    manual_instructions: |
      1. Log in to newsapi.org
      2. Go to Account → API key (or create new account for fresh key)
      3. Update NEWS_API_KEY in Infisical workspace moosenet-services

# Rotation state file (written by rotation.py)
# Location: /opt/lumina-fleet/security/rotation_state.json
# Format: {secret_name: {last_rotated: ISO8601, last_checked: ISO8601, status: ok|warn|expired}}
