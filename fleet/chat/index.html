<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #e5e5e5;
    font-family: system-ui, -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .chat-container {
    width: 100%;
    max-width: 720px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #1a1a2e;
    border-left: 1px solid rgba(124,58,237,0.2);
    border-right: 1px solid rgba(124,58,237,0.2);
  }
  .chat-header {
    background: linear-gradient(135deg, #7c3aed, #5dcaa5);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .chat-header .avatar {
    font-size: 28px;
  }
  .chat-header h1 {
    font-size: 1.1em;
    font-weight: 600;
    color: white;
  }
  .chat-header p {
    font-size: 0.75em;
    color: rgba(255,255,255,0.7);
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .message {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 0.875em;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .message.user {
    align-self: flex-end;
    background: #7c3aed;
    color: white;
    border-radius: 14px 14px 2px 14px;
  }
  .message.assistant {
    align-self: flex-start;
    background: rgba(255,255,255,0.07);
    color: #e5e5e5;
    border-radius: 14px 14px 14px 2px;
  }
  .message.thinking {
    align-self: flex-start;
    color: #888;
    font-size: 0.8em;
    padding: 4px 8px;
    background: none;
  }
  .quick-btns {
    padding: 8px 16px 0;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .quick-btn {
    background: rgba(124,58,237,0.15);
    color: #a78bfa;
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 16px;
    padding: 5px 12px;
    font-size: 0.78em;
    cursor: pointer;
    transition: background 0.15s;
  }
  .quick-btn:hover { background: rgba(124,58,237,0.3); }
  .quick-btn.green {
    background: rgba(93,202,165,0.12);
    color: #5dcaa5;
    border-color: rgba(93,202,165,0.3);
  }
  .quick-btn.green:hover { background: rgba(93,202,165,0.25); }
  .quick-btn.amber {
    background: rgba(239,159,39,0.12);
    color: #ef9f27;
    border-color: rgba(239,159,39,0.3);
  }
  .quick-btn.amber:hover { background: rgba(239,159,39,0.25); }
  .input-row {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    border-top: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  #chat-input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 10px 14px;
    color: white;
    font-size: 0.875em;
    outline: none;
    transition: border-color 0.15s;
  }
  #chat-input:focus { border-color: rgba(124,58,237,0.6); }
  #chat-input::placeholder { color: #666; }
  #send-btn {
    background: #7c3aed;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 0.875em;
    cursor: pointer;
    transition: background 0.15s;
  }
  #send-btn:hover { background: #6d28d9; }
  #send-btn:disabled { background: #444; cursor: default; }
  .error-banner {
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.4);
    color: #fca5a5;
    padding: 8px 14px;
    font-size: 0.8em;
    text-align: center;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">✨</div>
    <div>
      <h1>Lumina</h1>
      <p>MooseNet AI Orchestrator</p>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="quick-btns">
    <button class="quick-btn" onclick="sendMsg('Check my inbox')">Check inbox</button>
    <button class="quick-btn green" onclick="sendMsg('System status')">Status</button>
    <button class="quick-btn amber" onclick="sendMsg('Morning briefing')">Briefing</button>
    <button class="quick-btn" onclick="sendMsg('What tasks are urgent?')">Urgent tasks</button>
  </div>
  <div class="input-row">
    <input id="chat-input" type="text" placeholder="Ask Lumina..." autocomplete="off"
      onkeypress="if(event.key==='Enter')sendMsg()">
    <button id="send-btn" onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const GATEWAY = window.LUMINA_CHAT_GATEWAY || '';
const TOKEN = window.LUMINA_CHAT_TOKEN || '';

let history = [];
let busy = false;

function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = 'message ' + role;
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth' });
  return el;
}

async function sendMsg(text) {
  if (busy) return;
  const input = document.getElementById('chat-input');
  const msg = text || input.value.trim();
  if (!msg) return;
  input.value = '';

  addMessage('user', msg);
  history.push({ role: 'user', content: msg });

  busy = true;
  document.getElementById('send-btn').disabled = true;

  const thinking = document.createElement('div');
  thinking.className = 'message thinking';
  thinking.textContent = '✨ thinking...';
  document.getElementById('messages').appendChild(thinking);
  thinking.scrollIntoView({ behavior: 'smooth' });

  try {
    const resp = await fetch(GATEWAY, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + TOKEN
      },
      body: JSON.stringify({
        model: 'lumina',
        messages: history,
        stream: false
      })
    });

    thinking.remove();

    if (!resp.ok) {
      const errText = await resp.text();
      addMessage('assistant', 'Gateway error ' + resp.status + '. Is Lumina running?');
      console.error(errText);
    } else {
      const data = await resp.json();
      const reply = data.choices?.[0]?.message?.content || 'No response from Lumina.';
      addMessage('assistant', reply);
      history.push({ role: 'assistant', content: reply });
      // Keep history at 20 messages max
      if (history.length > 20) history = history.slice(-20);
    }
  } catch(e) {
    thinking.remove();
    addMessage('assistant', 'Connection error — cannot reach Lumina gateway.\n(' + e.message + ')');
  }

  busy = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('chat-input').focus();
}

// Initial greeting
window.addEventListener('load', () => {
  addMessage('assistant', '✨ Hello! I\'m Lumina, your MooseNet AI orchestrator.\n\nHow can I help you today?');
  document.getElementById('chat-input').focus();
});
</script>
</body>
</html>
